version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - db
    volumes:
      - ./.env:/app/.env  # solo env del back-end
    command: node app.js

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: spotify_clone
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"

volumes:
  db_data: